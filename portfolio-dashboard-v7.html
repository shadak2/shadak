<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --bg: #f0ede8; --surface: #fff; --border: #e0dbd4;
    --accent: #1a1a2e; --accent2: #c8432a;
    --up: #1a7a4a; --up-bg: #e8f5ee;
    --down: #c8432a; --down-bg: #fdf0ee;
    --muted: #8a8070; --gold-bg: #fffdf0; --warning: #c87a20;
    --text: #1a1a1a; --tv-blue: #2962ff; --ss-green: #00897b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; padding: 24px 20px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c8b89a' fill-opacity='0.08'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; padding-bottom: 18px; border-bottom: 2px solid var(--accent); }
  .logo-title { font-size: 26px; font-weight: 900; letter-spacing: -1px; color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--muted); margin-top: 5px; font-family: 'DM Mono', monospace; }
  .date-display { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-align: right; }
  .live-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--up); font-weight: 700; margin-top: 4px; }
  .live-badge::before { content: ''; width: 7px; height: 7px; background: var(--up); border-radius: 50%; animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .summary-banner { background: var(--accent); color: white; border-radius: 16px; padding: 22px 26px; margin-bottom: 16px; display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }
  .banner-label { font-size: 10px; opacity: 0.55; letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 5px; }
  .banner-value { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .banner-value.up { color: #4ade80; }
  .banner-sub { font-size: 11px; opacity: 0.45; margin-top: 2px; }

  .service-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .service-card { border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: all 0.2s; }
  .service-card:hover { opacity: 0.88; transform: translateY(-1px); }
  .service-ss { background: linear-gradient(135deg,#00695c,#00897b); color: white; }
  .service-tv { background: linear-gradient(135deg,#1565c0,#2962ff); color: white; }
  .service-icon { font-size: 26px; flex-shrink: 0; }
  .service-name { font-size: 13px; font-weight: 700; }
  .service-desc { font-size: 11px; opacity: 0.75; margin-top: 2px; }

  .analyze-btn { width: 100%; padding: 14px; background: var(--accent2); color: white; border: none; border-radius: 12px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700; cursor: pointer; margin-bottom: 16px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .analyze-btn:hover { background: #a83520; transform: translateY(-1px); }
  .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .analysis-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 20px; display: none; }
  .analysis-box.visible { display: block; animation: fadeIn 0.4s ease; }

  .analysis-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .analysis-badge { background: var(--accent); color: white; font-size: 10px; padding: 4px 12px; border-radius: 20px; letter-spacing: 1px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .analysis-date { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-left: auto; }
  .analysis-content { font-size: 13.5px; line-height: 1.9; white-space: pre-wrap; }
  .analysis-content h3 { font-size: 12px; font-weight: 700; color: var(--accent2); margin: 16px 0 8px; padding-left: 10px; border-left: 3px solid var(--accent2); }
  .loading-wrap { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px; }
  .dots { display: flex; gap: 5px; }
  .dots span { width: 7px; height: 7px; background: var(--accent2); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

  .section-label { display: flex; align-items: center; gap: 12px; margin: 8px 0 10px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  .stock-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 26px; }
  .stock-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px; display: grid; grid-template-columns: 1fr 100px 105px 85px 115px; align-items: center; gap: 10px; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
  .stock-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .stock-card.up::before { background: var(--up); }
  .stock-card.down::before { background: var(--down); }
  .stock-card.warn { border-color: #f0d080; background: var(--gold-bg); }
  .stock-card.warn::before { background: var(--warning); }
  .stock-card:hover { border-color: var(--accent); transform: translateX(3px); box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .stock-name { font-weight: 700; font-size: 14px; }
  .stock-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .stock-note { font-size: 10px; color: var(--warning); margin-top: 2px; font-weight: 500; }
  .stock-avg { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-align: right; }
  .stock-avg span { display: block; font-size: 10px; margin-bottom: 2px; }
  .stock-value { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; text-align: right; }
  .stock-value span { display: block; font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .stock-return { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; text-align: center; padding: 5px 8px; border-radius: 7px; }
  .stock-return.up { color: var(--up); background: var(--up-bg); }
  .stock-return.down { color: var(--down); background: var(--down-bg); }
  .stock-return.warn { color: var(--warning); background: var(--gold-bg); }
  .chart-btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px; width: 100%; padding: 7px 8px; border-radius: 8px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
  .btn-chart { background: var(--accent); color: white; }
  .btn-chart:hover { background: #2d2d4e; }
  .btn-ss { background: var(--ss-green); color: white; }

  /* ── 차트 모달 ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,10,20,0.75); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; animation: overlayIn 0.2s ease; }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }
  .modal { background: #131722; border-radius: 18px; width: 100%; max-width: 860px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); overflow: hidden; animation: modalIn 0.25s ease; display: flex; flex-direction: column; max-height: 90vh; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(20px)} to{opacity:1;transform:none} }

  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: #1e222d; flex-shrink: 0; }
  .modal-stock-title { font-size: 16px; font-weight: 700; color: white; }
  .modal-stock-meta { font-size: 11px; color: #787b86; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .modal-price { text-align: right; }
  .modal-price-val { font-size: 20px; font-weight: 700; color: white; font-family: 'DM Mono', monospace; }
  .modal-price-chg { font-size: 12px; font-family: 'DM Mono', monospace; margin-top: 2px; }

  .modal-tabs { display: flex; gap: 4px; padding: 10px 16px 0; background: #1e222d; flex-shrink: 0; }
  .tab-btn { padding: 6px 14px; border-radius: 8px 8px 0 0; border: none; font-size: 12px; font-family: 'DM Mono', monospace; font-weight: 500; cursor: pointer; background: transparent; color: #787b86; transition: all 0.15s; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: #2962ff; border-bottom-color: #2962ff; font-weight: 700; }

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #787b86; font-family: 'DM Mono', monospace; }
  .legend-dot { width: 20px; height: 2px; border-radius: 2px; }

  .modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: #1e222d; flex-shrink: 0; border-top: 1px solid #2a2e39; }

  .modal-close { padding: 8px 18px; background: #2962ff; color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; transition: background 0.15s; }
  .modal-close:hover { background: #1a4fd6; }

  .chart-loading { display: flex; align-items: center; justify-content: center; height: 440px; color: #787b86; font-size: 14px; gap: 12px; }

  @media (max-width: 660px) {
    .summary-banner { grid-template-columns: 1fr 1fr; }
    .stock-card { grid-template-columns: 1fr auto; gap: 8px; }
    .stock-avg, .stock-value, .stock-return { display: none; }
    .service-row { grid-template-columns: 1fr; }
    #chartContainer { height: 320px; }
    .modal { max-height: 95vh; }
  }
</style>

<script>
// ── 데이터 ──
const KR = [
  { name:'LS ELECTRIC',    ticker:'010120', yf:'010120.KS', shares:62,  avg:186582, val:19747000, ret:70.70 },
  { name:'산일전기',        ticker:'062870', yf:'062870.KS', shares:40,  avg:214125, val:12960000, ret:51.31 },
  { name:'한국금융지주',    ticker:'071050', yf:'071050.KS', shares:35,  avg:249071, val:9730000,  ret:11.61 },
  { name:'퀄리타스반도체',  ticker:'432720', yf:'432720.KQ', shares:303, avg:20556,  val:8044650,  ret:29.15 },
  { name:'파미셀',          ticker:'005690', yf:'005690.KS', shares:385, avg:18510,  val:7376600,  ret:3.50  },
  { name:'SK이노베이션',    ticker:'096770', yf:'096770.KS', shares:50,  avg:129600, val:6897500,  ret:6.44  },
  { name:'세미파이브',      ticker:'440320', yf:'440320.KQ', shares:144, avg:36827,  val:6235200,  ret:17.57 },
  { name:'디바이스이온',    ticker:'347770', yf:'347770.KQ', shares:200, avg:37900,  val:4060000,  ret:-46.43, warn:true, note:'⚡ 무상증자(1:1) 반영 — 실질손실 아님' },
  { name:'LS머트리얼즈',   ticker:'417200', yf:'417200.KS', shares:141, avg:20000,  val:3792900,  ret:31.46 },
];
const US = [
  { name:'GDXU',           ticker:'GDXU',  yf:'GDXU',  shares:35, avg:179.49, val:6688.15, ret:6.45,  note:'금 3배 레버리지' },
  { name:'이튼 ETN',       ticker:'ETN',   yf:'ETN',   shares:13, avg:417.41, val:5486.00, ret:1.09  },
  { name:'코닝 GLW',       ticker:'GLW',   yf:'GLW',   shares:25, avg:164.34, val:4657.25, ret:13.35 },
  { name:'버티브홀딩스',   ticker:'VRT',   yf:'VRT',   shares:12, avg:299.22, val:4314.12, ret:20.14 },
  { name:'NVE NVEC',       ticker:'NVEC',  yf:'NVEC',  shares:40, avg:84.55,  val:3451.20, ret:2.04  },
  { name:'암페놀 APH',     ticker:'APH',   yf:'APH',   shares:20, avg:139.93, val:2786.40, ret:-0.43 },
];

const PERIODS = [
  { label:'1개월', days:30 },
  { label:'3개월', days:90 },
  { label:'6개월', days:180 },
  { label:'1년',   days:365 },
  { label:'전체',  days:1095 },
];

let chart = null, currentStock = null, currentPeriod = 2;

// ── 유틸 ──
function fmtKRW(v){ if(v>=1e8) return (v/1e8).toFixed(2)+'억'; if(v>=1e4) return Math.round(v/1e4)+'만원'; return v.toLocaleString()+'원'; }

// ── Yahoo Finance 프록시 ──
async function fetchOHLC(symbol, days) {
  const end = Math.floor(Date.now()/1000);
  const start = end - days * 86400;
  // CORS 우회 프록시
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&period1=${start}&period2=${end}&events=history`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  try {
    const res = await fetch(proxy);
    const data = await res.json();
    const parsed = JSON.parse(data.contents);
    const result = parsed.chart.result[0];
    const quotes = result.indicators.quote[0];
    const timestamps = result.timestamp;
    const candles = [];
    for(let i=0; i<timestamps.length; i++){
      if(!quotes.open[i] || !quotes.close[i]) continue;
      candles.push({
        time: timestamps[i],
        open: +quotes.open[i].toFixed(4),
        high: +quotes.high[i].toFixed(4),
        low: +quotes.low[i].toFixed(4),
        close: +quotes.close[i].toFixed(4),
      });
    }
    return candles.sort((a,b)=>a.time-b.time);
  } catch(e) {
    return null;
  }
}

// ── 선형회귀 계산 ──
function linearRegression(data) {
  const n = data.length;
  let sumX=0, sumY=0, sumXY=0, sumXX=0;
  data.forEach((d,i)=>{ sumX+=i; sumY+=d.close; sumXY+=i*d.close; sumXX+=i*i; });
  const slope = (n*sumXY - sumX*sumY) / (n*sumXX - sumX*sumX);
  const intercept = (sumY - slope*sumX) / n;

  // 표준편차 계산
  let sumSq = 0;
  data.forEach((d,i)=>{ const reg=slope*i+intercept; sumSq+=(d.close-reg)**2; });
  const stdDev = Math.sqrt(sumSq/n);

  return { slope, intercept, stdDev };
}

// ── 이동평균 ──
function calcMA(data, period) {
  const result = [];
  for(let i=0; i<data.length; i++){
    if(i < period-1){ result.push(null); continue; }
    const sum = data.slice(i-period+1, i+1).reduce((s,d)=>s+d.close, 0);
    result.push({ time: data[i].time, value: +(sum/period).toFixed(4) });
  }
  return result.filter(d=>d!==null);
}

// ── 차트 그리기 ──
async function drawChart(stock, periodIdx) {
  const container = document.getElementById('chartContainer');
  container.innerHTML = `<div class="chart-loading"><div class="dots"><span></span><span></span><span></span></div>데이터 로딩 중...</div>`;

  const days = PERIODS[periodIdx].days;
  const candles = await fetchOHLC(stock.yf, days);

  if (!candles || candles.length < 10) {
    container.innerHTML = `<div class="chart-loading" style="flex-direction:column;gap:8px">
      <div style="font-size:24px">📊</div>
      <div>Yahoo Finance 데이터를 불러올 수 없습니다</div>
      <div style="font-size:12px;opacity:0.6">심플리스톡 또는 TradingView에서 확인하세요</div>
    </div>`;
    return;
  }

  // 가격 업데이트
  const last = candles[candles.length-1];
  const prev = candles[candles.length-2];
  const isKR = stock.avg > 1000;
  const chgPct = ((last.close-prev.close)/prev.close*100).toFixed(2);
  const chgSign = chgPct >= 0 ? '+' : '';
  document.getElementById('modalPrice').textContent = isKR ? last.close.toLocaleString()+'원' : '$'+last.close.toFixed(2);
  const chgEl = document.getElementById('modalChg');
  chgEl.textContent = `${chgSign}${chgPct}%`;
  chgEl.style.color = chgPct >= 0 ? '#26a69a' : '#ef5350';

  // 차트 생성
  if(chart) { chart.remove(); chart=null; }
  container.innerHTML = '';

  chart = LightweightCharts.createChart(container, {
    width: container.clientWidth,
    height: container.clientHeight || 440,
    layout: { background:{color:'#131722'}, textColor:'#d1d4dc' },
    grid: { vertLines:{color:'#1e222d'}, horzLines:{color:'#1e222d'} },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor:'#2a2e39' },
    timeScale: { borderColor:'#2a2e39', timeVisible:true },
  });

  // 캔들 시리즈
  const candleSeries = chart.addCandlestickSeries({
    upColor:'#26a69a', downColor:'#ef5350',
    borderUpColor:'#26a69a', borderDownColor:'#ef5350',
    wickUpColor:'#26a69a', wickDownColor:'#ef5350',
  });
  candleSeries.setData(candles);

  // 회귀채널 계산
  const { slope, intercept, stdDev } = linearRegression(candles);

  // 중심선
  const centerData = candles.map((d,i)=>({ time:d.time, value:+(slope*i+intercept).toFixed(4) }));
  const centerSeries = chart.addLineSeries({ color:'#f0a500', lineWidth:1, lineStyle:LightweightCharts.LineStyle.Dashed });
  centerSeries.setData(centerData);

  // 상단 채널 +1σ, +2σ
  const upper1Data = candles.map((d,i)=>({ time:d.time, value:+(slope*i+intercept+stdDev).toFixed(4) }));
  const upper2Data = candles.map((d,i)=>({ time:d.time, value:+(slope*i+intercept+2*stdDev).toFixed(4) }));
  const lower1Data = candles.map((d,i)=>({ time:d.time, value:+(slope*i+intercept-stdDev).toFixed(4) }));
  const lower2Data = candles.map((d,i)=>({ time:d.time, value:+(slope*i+intercept-2*stdDev).toFixed(4) }));

  const u1 = chart.addLineSeries({ color:'rgba(239,83,80,0.5)', lineWidth:1 });
  u1.setData(upper1Data);
  const u2 = chart.addLineSeries({ color:'#ef5350', lineWidth:1.5 });
  u2.setData(upper2Data);
  const l1 = chart.addLineSeries({ color:'rgba(38,166,154,0.5)', lineWidth:1 });
  l1.setData(lower1Data);
  const l2 = chart.addLineSeries({ color:'#26a69a', lineWidth:1.5 });
  l2.setData(lower2Data);

  // 이동평균선
  const ma20 = calcMA(candles, 20);
  const ma60 = calcMA(candles, 60);
  const ma120 = calcMA(candles, 120);

  if(ma20.length > 0){
    const ma20s = chart.addLineSeries({ color:'#2962ff', lineWidth:1.5 });
    ma20s.setData(ma20);
  }
  if(ma60.length > 0){
    const ma60s = chart.addLineSeries({ color:'#f0a500', lineWidth:1.5 });
    ma60s.setData(ma60);
  }
  if(ma120.length > 0){
    const ma120s = chart.addLineSeries({ color:'#9c27b0', lineWidth:1.5 });
    ma120s.setData(ma120);
  }

  chart.timeScale().fitContent();

  // 리사이즈
  const ro = new ResizeObserver(()=>{
    if(chart) chart.applyOptions({ width: container.clientWidth });
  });
  ro.observe(container);
}

// ── 모달 열기 ──
async function openModal(stock) {
  currentStock = stock;
  currentPeriod = 2;

  document.getElementById('modalTitle').textContent = stock.name;
  document.getElementById('modalMeta').textContent = `${stock.yf} · ${stock.shares}주 · ${stock.ret>=0?'+':''}${stock.ret.toFixed(2)}%`;
  document.getElementById('modalPrice').textContent = '로딩 중...';
  document.getElementById('modalChg').textContent = '';
  document.getElementById('modalInfo').textContent = 'Yahoo Finance · 일봉 · 회귀채널 + MA20/60/120';

  // 탭
  document.getElementById('modalTabs').innerHTML = PERIODS.map((p,i)=>
    `<button class="tab-btn ${i===currentPeriod?'active':''}" onclick="switchPeriod(${i})">${p.label}</button>`
  ).join('');

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  await drawChart(stock, currentPeriod);
}

async function switchPeriod(idx) {
  currentPeriod = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  await drawChart(currentStock, idx);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  if(chart){ chart.remove(); chart=null; }
  document.getElementById('chartContainer').innerHTML = '';
}

document.getElementById('modalOverlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── 렌더 ──
function render() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'}) +
    ' ' + now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  const tKRW=KR.reduce((s,x)=>s+x.val,0), tUSD=US.reduce((s,x)=>s+x.val,0);
  const kG=KR.filter(x=>!x.warn).reduce((s,x)=>s+(x.val-x.avg*x.shares),0);
  const uG=US.reduce((s,x)=>s+(x.val-x.avg*x.shares),0);
  document.getElementById('totalKRW').textContent=fmtKRW(tKRW);
  document.getElementById('krGain').textContent=(kG>=0?'+':'')+fmtKRW(kG);
  document.getElementById('totalUSD').textContent='$'+tUSD.toFixed(0);
  document.getElementById('usGain').textContent=(uG>=0?'+$':'-$')+Math.abs(uG).toFixed(0);
  const best=[...KR,...US].filter(x=>!x.warn).reduce((a,b)=>a.ret>b.ret?a:b);
  document.getElementById('bestStock').textContent=best.name;
  document.getElementById('bestReturn').textContent='+'+best.ret.toFixed(2)+'%';

  function card(s, isKR) {
    const cls=s.warn?'warn':(s.ret>=0?'up':'down');
    const rCls=s.warn?'warn':(s.ret>=0?'up':'down');
    const rStr=s.warn?'※무증':(s.ret>=0?'+':'')+s.ret.toFixed(2)+'%';
    const avgStr=isKR?s.avg.toLocaleString()+'원':'$'+s.avg;
    const valStr=isKR?fmtKRW(s.val):'$'+s.val.toFixed(0);
    const ssUrl=`https://simplystock.co.kr/stock/${s.ticker}/`;
    const stockJson=JSON.stringify(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="stock-card ${cls}">
      <div>
        <div class="stock-name">${s.name}</div>
        <div class="stock-meta">${s.ticker} · ${s.shares}주</div>
        ${s.note?`<div class="stock-note">${s.note}</div>`:''}
      </div>
      <div class="stock-avg"><span>평균가</span>${avgStr}</div>
      <div class="stock-value"><span>평가금액</span>${valStr}</div>
      <div class="stock-return ${rCls}">${rStr}</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="chart-btn btn-chart" onclick='event.stopPropagation();openModal(${JSON.stringify(s)})'>📈 차트분석</button>
        ${isKR
          ? `<a href="${ssUrl}" target="_blank" class="chart-btn btn-ss" onclick="event.stopPropagation()">🔗 심플리스톡</a>`
          : `<a href="https://kr.tradingview.com/chart/?symbol=${s.ticker}" target="_blank" class="chart-btn btn-ss" onclick="event.stopPropagation()" style="background:var(--tv-blue)">📊 TradingView</a>`
        }
      </div>
    </div>`;
  }

  document.getElementById('krList').innerHTML=KR.map(s=>card(s,true)).join('');
  document.getElementById('usList').innerHTML=US.map(s=>card(s,false)).join('');
}

// ── AI 분석 ──
async function runAnalysis() {
  const btn=document.getElementById('analyzeBtn'), box=document.getElementById('analysisBox');
  const content=document.getElementById('analysisContent'), dateEl=document.getElementById('analysisDate');
  btn.disabled=true; btn.innerHTML='⏳ 분석 중...';
  box.className='analysis-box visible';
  content.innerHTML='<div class="loading-wrap"><div class="dots"><span></span><span></span><span></span></div>오늘 시황 수집 중...</div>';
  const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  dateEl.textContent=today;
  const ptf=`[한국]\n${KR.map(s=>`- ${s.name}(${s.ticker}): ${s.shares}주, 평균 ${s.avg.toLocaleString()}원, 수익 ${s.ret}%${s.warn?' [무상증자]':''}`).join('\n')}\n[미국]\n${US.map(s=>`- ${s.name}(${s.ticker}): ${s.shares}주, 평균 $${s.avg}, 수익 ${s.ret}%`).join('\n')}`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`전문 주식 포트폴리오 분석가로서 오늘(${today}) 시황을 검색하고 아래 포트폴리오를 분석해주세요.\n${ptf}\n\n형식:\n📊 오늘 시황 요약\n⚡ 주목 종목 TOP 3\n💡 포트 조절 제안\n📌 오늘의 액션 아이템\n⚠️ 리스크 체크\n\n간결하고 실용적으로 한국어로.`}]})});
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    content.innerHTML=text.replace(/^(📊|⚡|💡|📌|⚠️).+$/gm,m=>`<h3>${m}</h3>`).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  } catch(e){ content.textContent='오류: '+e.message; }
  finally{ btn.disabled=false; btn.innerHTML='🔄 다시 분석'; }
}

render();
</script>
