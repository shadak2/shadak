<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fa;--surface:#fff;--border:#e9ecef;--border2:#dee2e6;--accent:#1971c2;--accent-bg:#e7f5ff;--text:#212529;--text2:#495057;--muted:#868e96;--up:#e03131;--up-bg:#fff5f5;--down:#1971c2;--down-bg:#e7f5ff;--warn:#e67700;--warn-bg:#fff9db;--chart-bg:#1a1d24}
html,body{height:100%}body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.5;padding-bottom:62px}
.nav{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 14px;gap:8px}
.nav-logo{font-size:16px;font-weight:700}.nav-logo em{color:var(--accent);font-style:normal}
.nav-search{flex:1;max-width:260px;height:34px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:0 10px;display:flex;align-items:center;font-size:13px;color:var(--muted);cursor:pointer}
.nav-r{margin-left:auto;display:flex;gap:5px}
.nb{padding:5px 10px;border-radius:6px;border:1px solid var(--border2);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--text2);font-family:inherit;text-decoration:none}
.nb.p{background:var(--accent);color:#fff;border-color:var(--accent)}
.tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:0 8px;overflow-x:auto;height:42px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:0 10px;height:100%;display:flex;align-items:center;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.main{max-width:900px;margin:0 auto;padding:12px}.page{display:none}.page.on{display:block}
.update-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;color:var(--muted);padding:0 2px;gap:6px;flex-wrap:wrap}
.update-bar .left{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.refresh-btn{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;font-family:inherit;font-weight:600}
.refresh-btn:disabled{opacity:0.5}.refresh-btn.on{background:var(--up);color:#fff;border-color:var(--up)}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.sc-l{font-size:11px;color:var(--muted);margin-bottom:4px}.sc-v{font-size:18px;font-weight:700}.sc-s{font-size:11px;margin-top:2px}
.sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sec-t{font-size:14px;font-weight:700}.sec-b{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 9px;border-radius:20px;border:1px solid var(--border)}
.tbl{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.tr{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:8px}
.tr:last-child{border-bottom:none}.tr.w{background:var(--warn-bg)}
.tr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.tr-name{flex:1;min-width:0}
.rn{font-weight:700;font-size:14px}.rc{font-size:11px;color:var(--muted);margin-top:1px}
.rno{font-size:10px;color:var(--warn);margin-top:3px;font-weight:600}
.tr-rt-box{text-align:right}.tr-rt{font-size:16px;font-weight:800;line-height:1.1}
.tr-rt.up{color:var(--up)}.tr-rt.dn{color:var(--down)}.tr-rt.wt{color:var(--warn);font-size:12px}
.tr-rt-sub{font-size:10px;font-weight:600;color:var(--muted);margin-top:2px}
.tr-rt-sub.up{color:var(--up)}.tr-rt-sub.dn{color:var(--down)}
.tr-prices{display:flex;gap:6px;align-items:center;padding:7px 10px;background:var(--bg);border-radius:8px;flex-wrap:wrap;font-size:11px;border:1px solid var(--border)}
.tp-grp{display:flex;align-items:baseline;gap:3px}.tp-l{color:var(--muted);font-size:10px;font-weight:500}
.tp-v{color:var(--text);font-weight:700;font-size:12px;transition:background 0.6s}
.tp-v.flash-up{background:var(--up-bg);box-shadow:0 0 0 3px var(--up-bg);border-radius:3px}
.tp-v.flash-dn{background:var(--down-bg);box-shadow:0 0 0 3px var(--down-bg);border-radius:3px}
.tp-arr{color:var(--muted);font-weight:bold;margin:0 2px}
.rbs{display:flex;gap:4px}
.rb{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;flex:1}
.rb-c{background:var(--accent-bg);color:var(--accent)}.rb-e{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}
.ai-btn{width:100%;padding:12px;margin-bottom:12px;background:linear-gradient(135deg,#1971c2,#1098ad);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.ai-btn:disabled{opacity:.5}
.abox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;display:none}.abox.on{display:block}

.abadge{background:var(--accent);color:#fff;font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700}
.adate{font-size:11px;color:var(--muted);margin-left:auto}
.ac{font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--text2)}
.ac h3{font-size:12px;font-weight:700;color:var(--accent);margin:12px 0 5px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0;cursor:pointer;font-size:9px;color:var(--muted);gap:2px;border:none;background:none;font-family:inherit}
.bt.on{color:var(--accent)}.bt .ico{font-size:18px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}.ov.on{display:block}
.sheet{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--chart-bg);display:flex;flex-direction:column;color:#e5e7eb}
.sh-head{padding:10px 14px;border-bottom:1px solid #2d3139}
.sh-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.sh-name{font-size:16px;font-weight:700;color:#fff}.sh-meta{font-size:10px;color:#9ca3af;margin-top:1px}
.sh-price{font-size:19px;font-weight:700;text-align:right;color:#fff}.sh-chg{font-size:11px;font-weight:600;text-align:right;margin-top:1px}
.sh-chg.up{color:var(--up)}.sh-chg.dn{color:var(--down)}
.sh-bar{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.ib{padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;border:1px solid}
.ib-up{background:rgba(224,49,49,.15);color:#f87171;border-color:rgba(224,49,49,.4)}
.ib-dn{background:rgba(25,113,194,.15);color:#60a5fa;border-color:rgba(25,113,194,.4)}
.ib-neu{background:rgba(156,163,175,.15);color:#9ca3af;border-color:rgba(156,163,175,.3)}
.ib-vol{background:rgba(167,139,250,.15);color:#a78bfa;border-color:rgba(167,139,250,.4)}
.ib-pos{background:rgba(96,165,250,.15);color:#60a5fa;border-color:rgba(96,165,250,.4)}
.ib-buy{background:rgba(244,63,94,.15);color:#fb7185;border-color:rgba(244,63,94,.4)}
.ib-sell{background:rgba(250,204,21,.15);color:#facc15;border-color:rgba(250,204,21,.4)}
.ib-live{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.4);animation:pulse 1.5s infinite}
.ib-src{background:rgba(96,165,250,.1);color:#93c5fd;border-color:rgba(96,165,250,.3)}
.ib-alert-buy{background:rgba(34,197,94,.2);color:#4ade80;border-color:#4ade80;font-weight:800;font-size:10px;padding:3px 9px}
.ib-alert-sell{background:rgba(224,49,49,.2);color:#f87171;border-color:#f87171;font-weight:800;font-size:10px;padding:3px 9px}
.ib-alert-warn{background:rgba(250,204,21,.2);color:#facc15;border-color:#facc15;font-weight:800;font-size:10px;padding:3px 9px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.sh-ctrl,.ind-bar,.ma-bar{display:flex;align-items:center;padding:6px 14px 0;gap:3px;overflow-x:auto;scrollbar-width:none}
.sh-ctrl::-webkit-scrollbar,.ind-bar::-webkit-scrollbar,.ma-bar::-webkit-scrollbar{display:none}
.cb{padding:4px 9px;border-radius:6px;border:1px solid #374151;font-size:10px;font-weight:600;cursor:pointer;background:#252830;color:#9ca3af;font-family:inherit;white-space:nowrap}
.cb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.csep{width:1px;height:14px;background:#374151;margin:0 3px}
.cl{font-size:9px;color:#9ca3af;margin:0 4px;font-weight:600}
.ind{padding:3px 8px;border-radius:6px;border:1px solid #374151;font-size:10px;font-weight:600;cursor:pointer;background:#252830;color:#9ca3af;font-family:inherit;white-space:nowrap}
.ind.on{border-color:var(--accent);color:#60a5fa;background:rgba(25,113,194,.2)}
.ind.dbg{border-color:#facc15;color:#facc15;background:rgba(250,204,21,.1)}
.ind.dbg.on{background:#facc15;color:#000}
.ma-grp{display:flex;align-items:center;gap:3px}.ma-lbl{font-size:9px;font-weight:600;white-space:nowrap}
.day-info{padding:6px 14px;background:rgba(25,113,194,.08);border-bottom:1px solid #2d3139;display:flex;flex-wrap:wrap;gap:8px;font-size:10px;align-items:center;margin-top:6px}
.di-itm{display:flex;align-items:center;gap:3px}
.di-l{color:#9ca3af}.di-v{color:#fff;font-weight:600}.di-v.up{color:var(--up)}.di-v.dn{color:var(--down)}.di-v.warn{color:#facc15}
.sh-charts{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;background:var(--chart-bg)}
.sh-main{flex:5;min-height:280px;width:100%}.sh-vol{flex:1;min-height:70px;border-top:1px solid #2d3139;width:100%}
.dbg-panel{display:none;background:#000;color:#0f0;font-family:'Courier New',monospace;font-size:9px;padding:8px;max-height:160px;overflow-y:auto;border-top:1px solid #facc15;line-height:1.4;white-space:pre-wrap;word-break:break-all}
.dbg-panel.on{display:block}.dbg-panel .e{color:#f87171}.dbg-panel .ok{color:#4ade80}.dbg-panel .w{color:#fbbf24}.dbg-panel .info{color:#93c5fd}
.sh-foot{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid #2d3139}
.sh-info{font-size:9px;color:#9ca3af}.sh-close{padding:6px 16px;background:#374151;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.cload{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#9ca3af;font-size:13px;text-align:center;padding:20px}
.cload-big{font-size:32px}.cload-detail{font-size:10px;color:#6b7280;max-width:90%}
.val-input-row{display:flex;gap:8px;margin-bottom:12px}
.val-input{flex:1;height:40px;border:1px solid var(--border2);border-radius:8px;padding:0 12px;font-size:13px;font-family:inherit;outline:none}
.val-btn{padding:0 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.news-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.lw{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px;padding:8px 0}
.dots span{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bup 1.2s infinite;margin:0 2px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bup{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
@media(min-width:640px){.bnav{display:none}body{padding-bottom:0}}
@media(max-width:639px){.sg{grid-template-columns:1fr 1fr}}
.ver-tag{position:fixed;top:8px;right:8px;background:rgba(25,113,194,.9);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700;z-index:99}
.live-dot{display:inline-block;width:6px;height:6px;background:#22c55e;border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite;vertical-align:middle}
</style>

async function viaSelf(u,t){return fetchTO(`/api/proxy?url=${encodeURIComponent(u)}`,t||10000);}
function toStooqSym(y){let s=y.toLowerCase();if(s.endsWith('.ks'))return s.replace('.ks','.kr');if(s.endsWith('.kq'))return s.replace('.kq','.kr');if(!s.includes('.'))return s+'.us';return s;}
function parseStooqCSV(csv){if(!csv||csv.length<50)return null;const lines=csv.trim().split('\n');if(lines.length<2)return null;const h=lines[0].toLowerCase();if(!h.includes('date')||!h.includes('close'))return null;const data=[];for(let i=1;i<lines.length;i++){const c=lines[i].split(',');if(c.length<5)continue;const ts=Math.floor(new Date(c[0]+'T00:00:00Z').getTime()/1000);const o=parseFloat(c[1]),hi=parseFloat(c[2]),lo=parseFloat(c[3]),cl=parseFloat(c[4]),v=c[5]?parseFloat(c[5]):0;if(isNaN(ts)||isNaN(o)||isNaN(cl))continue;data.push({time:ts,open:+o.toFixed(4),high:+hi.toFixed(4),low:+lo.toFixed(4),close:+cl.toFixed(4),volume:v||0});}return data.length?data.sort((a,b)=>a.time-b.time):null;}

async function fetchStooqDaily(yf,days){const sym=toStooqSym(yf);const cached=stooqCache.get(sym);if(cached&&Date.now()-cached.ts<STOOQ_TTL)return days?cached.data.slice(-days):cached.data;const url=`https://stooq.com/q/d/l/?s=${sym}&i=d`;
if(selfProxyAvailable!==false){try{const r=await viaSelf(url,10000);if(r.ok){selfProxyAvailable=true;const csv=await r.text();const d=parseStooqCSV(csv);if(d&&d.length>=5){stooqCache.set(sym,{data:d,ts:Date.now()});dbg(`✓ Stooq 자체프록시 OK: ${sym} (${d.length}봉)`,'ok');return days?d.slice(-days):d;}dbg(`Stooq 자체 빈응답: ${sym}`,'warn');}else{if(r.status===404)selfProxyAvailable=false;dbg(`Stooq 자체 HTTP ${r.status}: ${sym}`,'warn');}}catch(e){dbg(`Stooq 자체 fail: ${e.message}`,'err');}}
try{const r=await fetchTO(`https://corsproxy.io/?url=${encodeURIComponent(url)}`,8000);if(r.ok){const csv=await r.text();const d=parseStooqCSV(csv);if(d&&d.length>=5){stooqCache.set(sym,{data:d,ts:Date.now()});dbg(`✓ Stooq corsproxy OK: ${sym}`,'ok');return days?d.slice(-days):d;}}}catch(e){dbg(`Stooq corsproxy fail: ${e.message}`,'err');}
try{const r=await fetchTO(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,10000);if(r.ok){const j=await r.json();if(j&&j.contents){const d=parseStooqCSV(j.contents);if(d&&d.length>=5){stooqCache.set(sym,{data:d,ts:Date.now()});dbg(`✓ Stooq allorigins OK: ${sym}`,'ok');return days?d.slice(-days):d;}}}}catch(e){dbg(`Stooq allorigins fail: ${e.message}`,'err');}
return null;}

async function yfFetch(url,timeout){timeout=timeout||8000;if(Date.now()<yahooCooldownUntil){const r=Math.ceil((yahooCooldownUntil-Date.now())/1000);dbg(`⏸️ Yahoo 쿨다운 ${r}s (스킵)`,'warn');return null;}
if(selfProxyAvailable!==false){try{const r=await viaSelf(url,timeout);if(r.status===429){yahooCooldownUntil=Date.now()+YAHOO_COOLDOWN_MS;dbg(`❌ Yahoo 429 → 2분 쿨다운`,'err');return null;}if(r.ok){selfProxyAvailable=true;const t=await r.text();try{const j=JSON.parse(t);if(j&&j.chart){dbg(`✓ Yahoo 자체프록시 OK`,'ok');return j;}}catch(e){}}else{if(r.status===404)selfProxyAvailable=false;dbg(`Yahoo 자체 HTTP ${r.status}`,'warn');}}catch(e){dbg(`Yahoo 자체 fail: ${e.message}`,'err');}}
try{const r=await fetchTO(`https://corsproxy.io/?url=${encodeURIComponent(url)}`,timeout);if(r.status===429){yahooCooldownUntil=Date.now()+YAHOO_COOLDOWN_MS;dbg(`❌ Yahoo 429 (corsproxy) → 쿨다운`,'err');return null;}if(r.ok){const t=await r.text();try{const j=JSON.parse(t);if(j&&j.chart){dbg(`✓ Yahoo corsproxy OK`,'ok');return j;}}catch(e){}}}catch(e){}
try{const r=await fetchTO(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,timeout+2000);if(r.ok){const w=await r.json();if(w&&w.contents){try{const j=JSON.parse(w.contents);if(j&&j.chart){dbg(`✓ Yahoo allorigins OK`,'ok');return j;}}catch(e){}}}}catch(e){}
dbg(`❌ Yahoo 모든 소스 실패`,'err');return null;}

async function fetchYahooDaily(s,d,iv){iv=iv||'1d';const e=Math.floor(Date.now()/1000),st=e-d*86400;const u=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(s)}?interval=${iv}&period1=${st}&period2=${e}&events=history`;const j=await yfFetch(u,8000);if(!j||!j.chart||!j.chart.result||!j.chart.result[0])return null;return parseYahoo(j);}
async function fetchIntraday(s){const u=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(s)}?interval=1m&range=1d`;const j=await yfFetch(u,7000);if(!j||!j.chart||!j.chart.result||!j.chart.result[0])return null;return j.chart.result[0];}
function parseYahoo(p){const r=p.chart.result[0],q=r.indicators.quote[0],ts=r.timestamp||[],v=q.volume||[],c=[];for(let i=0;i<ts.length;i++){if(q.open[i]==null||q.close[i]==null)continue;c.push({time:ts[i],open:+q.open[i].toFixed(4),high:+q.high[i].toFixed(4),low:+q.low[i].toFixed(4),close:+q.close[i].toFixed(4),volume:v[i]||0});}return c.sort((a,b)=>a.time-b.time);}
function aggIntraday(I){if(!I)return null;const q=I.indicators.quote[0],ts=I.timestamp||[],m=I.meta||{};let o=null,h=-Infinity,l=Infinity,c=null,v=0;for(let i=0;i<ts.length;i++){if(q.open[i]==null||q.close[i]==null)continue;if(o===null)o=q.open[i];if(q.high[i]>h)h=q.high[i];if(q.low[i]<l)l=q.low[i];c=q.close[i];v+=q.volume[i]||0;}if(o===null)return null;const t=new Date();t.setHours(0,0,0,0);return{time:Math.floor(t.getTime()/1000),open:+o.toFixed(4),high:+h.toFixed(4),low:+l.toFixed(4),close:+c.toFixed(4),volume:v,regularMarketPrice:m.regularMarketPrice};}

// 🆕 v27: 외국인/기관 수급 (네이버 스크래핑)
async function fetchForeign(code){
  if(!code||!/^\d{6}$/.test(code))return null;
  const cached=foreignCache.get(code);
  if(cached&&Date.now()-cached.ts<FOREIGN_TTL)return cached.data;
  try{
    dbg(`외인/기관 수급 요청: ${code}`);
    const r=await fetchTO(`/api/foreign?code=${code}`,8000);
    if(r.ok){const j=await r.json();if(j.data&&j.data.length>0){foreignCache.set(code,{data:j.data,ts:Date.now()});dbg(`✓ 외인/기관 OK: ${code} (${j.data.length}일)`,'ok');return j.data;}else dbg(`외인/기관 빈 응답: ${code}`,'warn');}
    else dbg(`외인/기관 HTTP ${r.status}: ${code}`,'warn');
  }catch(e){dbg(`외인/기관 fail: ${e.message}`,'err');}
  return null;
}

async function fetchOHLC(s,d,iv){iv=iv||'1d';dbg(`━━━ ${s} (${iv}, ${d}일) ━━━`);let data=null,src='';if(iv==='1d'){data=await fetchStooqDaily(s,d);if(data&&data.length>=5)src='Stooq';}if(!data||data.length<5){dbg(`Stooq 실패 → Yahoo`,'warn');data=await fetchYahooDaily(s,d,iv);if(data&&data.length>=5)src='Yahoo';}if(!data||data.length<5){lastSrc='실패';dbg(`❌ ${s} 실패`,'err');return null;}lastSrc=src;
if(iv==='1d'){const tm=new Date();tm.setHours(0,0,0,0);const tts=Math.floor(tm.getTime()/1000);const lts=data.length?data[data.length-1].time:0;if(lts<tts){dbg(`오늘 캔들 보강 시도`,'info');const I=await fetchIntraday(s);const tb=aggIntraday(I);if(tb){data.push({time:tb.time,open:tb.open,high:tb.high,low:tb.low,close:tb.close,volume:tb.volume});lastSrc=src+'+1m';dbg(`✓ 오늘 캔들 보강 완료`,'ok');}else dbg(`오늘 캔들 보강 실패`,'warn');}}
dbg(`✓ ${s} 완료 (${lastSrc}, ${data.length}봉)`,'ok');return data;}

async function fetchLatestPrice(yf,code){if(code){const c=priceCache.get(code);if(c&&Date.now()-c.ts<PRICE_TTL)return c.price;}let p=null;try{const d=await fetchStooqDaily(yf,7);if(d&&d.length)p=d[d.length-1].close;}catch(e){}if(p===null){try{const I=await fetchIntraday(yf);if(I){const m=I.meta||{};if(m.regularMarketPrice)p=m.regularMarketPrice;else{const q=I.indicators.quote[0],cs=(q.close||[]).filter(c=>c!=null);if(cs.length)p=cs[cs.length-1];}}}catch(e){}}if(p===null){try{const d=await fetchYahooDaily(yf,7,'1d');if(d&&d.length)p=d[d.length-1].close;}catch(e){}}if(p!==null&&code)priceCache.set(code,{price:p,ts:Date.now()});return p;}

async function batchFetch(items,bs){bs=bs||3;const r=[];for(let i=0;i<items.length;i+=bs){const b=items.slice(i,i+bs);const x=await Promise.allSettled(b.map(s=>fetchLatestPrice(s.yf,s.code)));r.push(...x);if(i+bs<items.length)await new Promise(rs=>setTimeout(rs,300));}return r;}

async function updateAllPrices(force){if(priceUpdating)return;priceUpdating=true;const ut=document.getElementById('updateTime'),rb=document.getElementById('refreshBtn');if(ut)ut.innerHTML='<span class="live-dot"></span> 가격 갱신 중...';if(rb)rb.disabled=true;if(force){priceCache.clear();stooqCache.clear();foreignCache.clear();dbg(`🔄 캐시 비움`,'info');}[...KR,...US].forEach(s=>{if(s.cur!=null)prevPrices[s.code]=s.cur;});const all=[...KR,...US];let success=0,fail=0;dbg(`━━━ 가격 갱신 (${all.length}종목) ━━━`);const results=await batchFetch(all,3);results.forEach((r,i)=>{if(r.status==='fulfilled'&&r.value!=null){const s=all[i];s.cur=r.value;s.val=r.value*s.shares;if(!s.warn)s.ret=((r.value-s.avg)/s.avg)*100;success++;}else fail++;});render();const t=new Date(),ts=`${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;const pT=selfProxyAvailable?' · 🛡️자체':'',cT=Date.now()<yahooCooldownUntil?' · ⏸️Yahoo쿨다운':'';if(ut){if(success>0)ut.innerHTML=`<span class="live-dot"></span> ${ts} · ${success}개 갱신${fail>0?` (실패 ${fail})`:''}${pT}${cT}`;else ut.innerHTML=`<span style="color:var(--down)">❌ 실패 · 🐛 진단</span>`;}dbg(`✓ 가격 갱신: 성공 ${success}, 실패 ${fail}`,success>0?'ok':'err');if(rb)rb.disabled=false;priceUpdating=false;}
function toggleAutoRefresh(){const b=document.getElementById('autoBtn');if(autoTimer){clearInterval(autoTimer);autoTimer=null;b.textContent='▶ 자동(60s)';b.classList.remove('on');}else{autoTimer=setInterval(()=>updateAllPrices(false),60000);b.textContent='⏸ 자동 ON';b.classList.add('on');updateAllPrices(false);}}

// ====== 회귀/지표 ======
function linReg(d,uL){const n=d.length;let sx=0,sy=0,sxy=0,sxx=0;d.forEach((x,i)=>{const y=uL?Math.log(x.close):x.close;sx+=i;sy+=y;sxy+=i*y;sxx+=i*i;});const sl=(n*sxy-sx*sy)/(n*sxx-sx*sx),ic=(sy-sl*sx)/n;let sq=0;d.forEach((x,i)=>{const y=uL?Math.log(x.close):x.close;sq+=(y-(sl*i+ic))**2;});return{sl,ic,sd:Math.sqrt(sq/n)};}
function regVal(sl,ic,sd,i,m,uL){const v=sl*i+ic+m*sd;return uL?Math.exp(v):v;}
function calcMA(d,p){if(p<=0||d.length<p)return [];const r=[];for(let i=p-1;i<d.length;i++){const s=d.slice(i-p+1,i+1).reduce((a,x)=>a+x.close,0);r.push({time:d[i].time,value:+(s/p).toFixed(4)});}return r;}
// 🆕 v27: 적합도 R²
function calcR2(d,uL){if(d.length<5)return 0;const{sl,ic}=linReg(d,uL);const yM=d.reduce((s,x)=>s+(uL?Math.log(x.close):x.close),0)/d.length;let sT=0,sR=0;d.forEach((x,i)=>{const y=uL?Math.log(x.close):x.close;const yP=sl*i+ic;sT+=(y-yM)**2;sR+=(y-yP)**2;});return sT>0?Math.max(0,1-(sR/sT)):0;}
// 🆕 v27: 추세 강도 분류
function getTrendStrength(sl,uL){const v=uL?sl:sl/100;if(v>0.002)return{lbl:'↑↑강한상승',cls:'ib-up'};if(v>0.0005)return{lbl:'↑상승',cls:'ib-up'};if(v>0.0001)return{lbl:'↑약한상승',cls:'ib-up'};if(v<-0.002)return{lbl:'↓↓강한하락',cls:'ib-dn'};if(v<-0.0005)return{lbl:'↓하락',cls:'ib-dn'};if(v<-0.0001)return{lbl:'↓약한하락',cls:'ib-dn'};return{lbl:'→횡보',cls:'ib-neu'};}

function getChannelPos(d,idx){const s=d.slice(Math.max(0,d.length-shortMA));if(s.length<5)return{pct:'50'};const si=d.length-s.length;if(idx<si)idx=si;const li=idx-si;const{sl,ic,sd}=linReg(s,showLog);const u=regVal(sl,ic,sd,li,2,showLog),lo=regVal(sl,ic,sd,li,-2,showLog),c=d[idx].close;const p=((c-lo)/(u-lo)*100);return{pct:Math.max(0,Math.min(100,p)).toFixed(1)};}
function volRatio(d,p){p=p||20;if(d.length<p+1)return null;const a=d.slice(-p-1,-1).reduce((s,x)=>s+x.volume,0)/p;return a>0?(d[d.length-1].volume/a).toFixed(1):null;}

// 🆕 v27: 강화된 종합 진단 (외인/기관 수급 결합)
function getEnhancedDiagnosis(data,foreignData){
  if(data.length<5)return null;
  const slice=data.slice(Math.max(0,data.length-shortMA));
  if(slice.length<5)return null;
  const{sl,ic,sd}=linReg(slice,showLog);
  const r2=calcR2(slice,showLog);
  const li=slice.length-1;
  const lastY=showLog?Math.log(slice[li].close):slice[li].close;
  const center=sl*li+ic;
  const sigma=(lastY-center)/sd;
  const upper=regVal(sl,ic,sd,li,2,showLog);
  const lower=regVal(sl,ic,sd,li,-2,showLog);
  const close=slice[li].close;
  const channelPct=((close-lower)/(upper-lower)*100);
  const trend=getTrendStrength(sl,showLog);

  // 외인/기관 최근 3일 합계
  let instFlow=null,frgnFlow=null;
  if(foreignData&&foreignData.length>=2){
    const recent=foreignData.slice(0,Math.min(3,foreignData.length));
    instFlow=recent.reduce((s,d)=>s+(d.inst||0),0);
    frgnFlow=recent.reduce((s,d)=>s+(d.frgn||0),0);
  }

  // 강화된 매매 알림 메시지
  let alertMsg=null,alertCls=null;
  if(sigma>=1.8){
    if(frgnFlow!==null&&instFlow!==null){
      if(frgnFlow<-1000&&instFlow<-1000)alertCls='sell',alertMsg='⚠️ 채널 상단 + 외인·기관 매도 (조정 위험)';
      else if(frgnFlow<-1000)alertCls='sell',alertMsg='⚠️ 채널 상단 + 외인 매도 (상승추세 주의)';
      else if(instFlow<-1000)alertCls='sell',alertMsg='⚠️ 채널 상단 + 기관 매도 (상승추세 주의)';
      else if(frgnFlow>1000&&instFlow>1000)alertCls='buy',alertMsg='🚀 채널 상단 + 외인·기관 매수 (강세 지속)';
      else if(frgnFlow>1000)alertCls='buy',alertMsg='🚀 채널 상단 + 외인 매수 (강세 지속)';
      else alertCls='warn',alertMsg='⚠️ 채널 상단 (조정 주의)';
    }else alertCls='warn',alertMsg='⚠️ 채널 상단 (조정 주의)';
  }else if(sigma<=-1.8){
    if(frgnFlow!==null&&instFlow!==null){
      if(frgnFlow>1000&&instFlow>1000)alertCls='buy',alertMsg='✓ 채널 하단 + 외인·기관 매수 (반등 시그널)';
      else if(frgnFlow>1000)alertCls='buy',alertMsg='✓ 채널 하단 + 외인 매수 (반등 시그널)';
      else if(instFlow>1000)alertCls='buy',alertMsg='✓ 채널 하단 + 기관 매수 (반등 시그널)';
      else if(frgnFlow<-1000&&instFlow<-1000)alertCls='sell',alertMsg='⚠️ 채널 하단 + 외인·기관 매도 (추가 하락 주의)';
      else if(frgnFlow<-1000)alertCls='sell',alertMsg='⚠️ 채널 하단 + 외인 매도 (추가 하락 주의)';
      else alertCls='warn',alertMsg='✓ 채널 하단 (반등 가능)';
    }else alertCls='warn',alertMsg='✓ 채널 하단 (반등 가능)';
  }

  return{trend,fitness:Math.round(r2*100),channelPct:channelPct.toFixed(0),sigma,instFlow,frgnFlow,alertMsg,alertCls};
}

function calcIchi(d){const h=(s,e)=>Math.max(...d.slice(s,e).map(x=>x.high)),l=(s,e)=>Math.min(...d.slice(s,e).map(x=>x.low));const t=[],k=[],a=[],b=[];for(let i=8;i<d.length;i++)t.push({time:d[i].time,value:(h(i-8,i+1)+l(i-8,i+1))/2});for(let i=25;i<d.length;i++)k.push({time:d[i].time,value:(h(i-25,i+1)+l(i-25,i+1))/2});for(let i=25;i<d.length;i++){const ti=t.find(x=>x.time===d[i].time),ki=k.find(x=>x.time===d[i].time);if(ti&&ki)a.push({time:d[i].time,value:(ti.value+ki.value)/2});}for(let i=51;i<d.length;i++)b.push({time:d[i].time,value:(h(i-51,i+1)+l(i-51,i+1))/2});return{tenkan:t,kijun:k,spanA:a,spanB:b};}

// 🆕 v27: 강화 인포바 (외인/기관 + 진단)
function renderInfobarV2(data,hasLive,src,foreignData){
  const diag=getEnhancedDiagnosis(data,foreignData);
  if(!diag){document.getElementById('shBar').innerHTML='<div class="ib ib-neu">데이터 부족</div>';return;}

  let h='';
  if(src)h+=`<div class="ib ib-src">📡 ${src}</div>`;
  if(hasLive)h+=`<div class="ib ib-live">● LIVE 장중</div>`;

  // 추세 + 적합도
  h+=`<div class="ib ${diag.trend.cls}">${diag.trend.lbl} · 적합도 ${diag.fitness}%</div>`;

  // 채널 위치
  const pNum=parseFloat(diag.channelPct);
  const posC=pNum>=80||pNum<=20?'ib-vol':'ib-pos';
  h+=`<div class="ib ${posC}">채널 ${diag.channelPct}% 위치</div>`;

  // 거래량
  const vr=volRatio(data);
  if(vr)h+=`<div class="ib ib-vol">거래량 ${vr}배</div>`;

  // 외인/기관 (한국 종목만 데이터 있음)
  if(diag.frgnFlow!==null){
    const fS=diag.frgnFlow>0?'+':'',fC=diag.frgnFlow>0?'ib-up':(diag.frgnFlow<0?'ib-dn':'ib-neu');
    h+=`<div class="ib ${fC}">외인 ${fS}${(diag.frgnFlow/10000).toFixed(1)}만</div>`;
  }
  if(diag.instFlow!==null){
    const iS=diag.instFlow>0?'+':'',iC=diag.instFlow>0?'ib-up':(diag.instFlow<0?'ib-dn':'ib-neu');
    h+=`<div class="ib ${iC}">기관 ${iS}${(diag.instFlow/10000).toFixed(1)}만</div>`;
  }

  // ⭐ 강화된 알림 메시지 (가장 강조)
  if(diag.alertMsg){
    const cls=diag.alertCls==='buy'?'ib-alert-buy':diag.alertCls==='sell'?'ib-alert-sell':'ib-alert-warn';
    h+=`<div class="ib ${cls}">${diag.alertMsg}</div>`;
  }

  document.getElementById('shBar').innerHTML=h;
}

function renderDayInfo(d,idx){if(!d||idx<0||idx>=d.length)return;const x=d[idx],p=idx>0?d[idx-1]:null;const isKR=curStock&&curStock.avg>1000,c=isKR?'':'$',c2=isKR?'원':'';const fmt=v=>isKR?Math.round(v).toLocaleString():(+v).toFixed(2);const dt=new Date(x.time*1000),ds=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;const ch=p?((x.close-p.close)/p.close*100):0,cC=ch>=0?'up':'dn',cS=(ch>=0?'+':'')+ch.toFixed(2)+'%';const{pct}=getChannelPos(d,idx),pC=parseFloat(pct)>=80||parseFloat(pct)<=20?'warn':'';const pL=parseFloat(pct)>=80?'상단근접':parseFloat(pct)<=20?'하단근접':parseFloat(pct)>=50?'중상부':'중하부';document.getElementById('dayInfo').innerHTML=`<div class="di-itm"><span class="di-l">📅</span><span class="di-v">${ds}</span></div><div class="di-itm"><span class="di-l">시</span><span class="di-v">${c}${fmt(x.open)}${c2}</span></div><div class="di-itm"><span class="di-l">고</span><span class="di-v up">${c}${fmt(x.high)}${c2}</span></div><div class="di-itm"><span class="di-l">저</span><span class="di-v dn">${c}${fmt(x.low)}${c2}</span></div><div class="di-itm"><span class="di-l">종</span><span class="di-v">${c}${fmt(x.close)}${c2}</span></div><div class="di-itm"><span class="di-l">전일대비</span><span class="di-v ${cC}">${cS}</span></div><div class="di-itm"><span class="di-l">채널</span><span class="di-v ${pC}">${pct}% (${pL})</span></div><div class="di-itm"><span class="di-l">거래량</span><span class="di-v">${(x.volume/10000).toFixed(0)}만</span></div>`;}

mainChart=LightweightCharts.createChart(mEl,{width:mEl.clientWidth,height:mEl.clientHeight,layout:{background:{color:'#1a1d24'},textColor:'#9ca3af'},grid:{vertLines:{color:'#252830'},horzLines:{color:'#252830'}},crosshair:{mode:LightweightCharts.CrosshairMode.Normal},rightPriceScale:{borderColor:'#374151',mode:showLog?LightweightCharts.PriceScaleMode.Logarithmic:0},timeScale:{borderColor:'#374151',timeVisible:true,rightOffset:5}});
const cs=mainChart.addCandlestickSeries({upColor:'#e03131',downColor:'#1971c2',borderUpColor:'#e03131',borderDownColor:'#1971c2',wickUpColor:'#e03131',wickDownColor:'#1971c2'});
cs.setData(data.map(d=>({time:d.time,open:d.open,high:d.high,low:d.low,close:d.close})));
if(showIchi&&data.length>52){const{tenkan,kijun,spanA,spanB}=calcIchi(data);if(tenkan.length){const s=mainChart.addLineSeries({color:'#ec4899',lineWidth:1,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});s.setData(tenkan);}if(kijun.length){const s=mainChart.addLineSeries({color:'#06b6d4',lineWidth:1,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});s.setData(kijun);}if(spanA.length){const s=mainChart.addAreaSeries({lineColor:'rgba(34,197,94,0.5)',topColor:'rgba(34,197,94,0.2)',bottomColor:'rgba(34,197,94,0)',lineWidth:1,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});s.setData(spanA);}if(spanB.length){const s=mainChart.addAreaSeries({lineColor:'rgba(239,68,68,0.5)',topColor:'rgba(239,68,68,0.2)',bottomColor:'rgba(239,68,68,0)',lineWidth:1,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});s.setData(spanB);}}
if(lineMode>0){const ss=data.slice(Math.max(0,data.length-shortMA));if(ss.length>=5){const{sl,ic,sd}=linReg(ss,showLog);let lines;if(lineMode===7){lines=[[0,'#f59f00',2.5,LightweightCharts.LineStyle.Solid],[1,'rgba(245,159,0,0.5)',1,0],[2,'rgba(245,159,0,0.85)',2,0],[3,'rgba(245,159,0,0.25)',1,LightweightCharts.LineStyle.Dotted],[-1,'rgba(245,159,0,0.5)',1,0],[-2,'rgba(245,159,0,0.85)',2,0],[-3,'rgba(245,159,0,0.25)',1,LightweightCharts.LineStyle.Dotted]];}else{lines=[[0,'#f59f00',2.5,LightweightCharts.LineStyle.Solid],[2,'rgba(245,159,0,0.85)',2,0],[-2,'rgba(245,159,0,0.85)',2,0]];}lines.forEach(([m,c,w,ls])=>{const s=mainChart.addLineSeries({color:c,lineWidth:w,lineStyle:ls||0,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});s.setData(ss.map((d,i)=>({time:d.time,value:+regVal(sl,ic,sd,i,m,showLog).toFixed(4)})));});}

async function callAI(b){const r=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return await r.json();}
async function runHealth(){const btn=document.getElementById('healthBtn'),box=document.getElementById('healthBox'),ct=document.getElementById('healthContent'),dt=document.getElementById('healthDate');btn.disabled=true;btn.textContent='⏳ 분석 중...';box.className='abox on';ct.innerHTML='<div class="lw"><div class="dots"><span></span><span></span><span></span></div> 분석 중...</div>';const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});dt.textContent=today;const ptf=`[한국]\n${KR.map(s=>`- ${s.name}(${s.code}): ${s.shares}주, 수익 ${s.ret.toFixed(2)}%${s.warn?' [무상증자]':''}`).join('\n')}\n\n[미국]\n${US.map(s=>`- ${s.name}: ${s.shares}주, 수익 ${s.ret.toFixed(2)}%`).join('\n')}`;try{const data=await callAI({model:'claude-sonnet-4-5',max_tokens:1200,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`전문 포트폴리오 분석가로서 오늘(${today}) 시황을 검색하고 다음 포트폴리오를 분석해주세요.\n\n${ptf}\n\n형식:\n🏥 전체 건강 점수\n💰 밸류 평가\n📊 기술적 평가\n🎯 분산도\n⚡ 주목 종목\n📌 개선 제안`}]});if(data.error)throw new Error(typeof data.error==='string'?data.error:JSON.stringify(data.error));const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');ct.innerHTML=text.replace(/^(🏥|💰|📊|🎯|⚡|📌).+$/gm,m=>`<h3>${m}</h3>`).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');}catch(e){ct.textContent='오류: '+e.message;}finally{btn.disabled=false;btn.textContent='🔄 다시 실행';}}
async function runNews(){const btn=document.getElementById('newsBtn'),nl=document.getElementById('newsList');btn.disabled=true;btn.textContent='⏳ 검색 중...';nl.innerHTML='<div class="lw"><div class="dots"><span></span><span></span><span></span></div> 검색 중...</div>';const names=[...KR,...US].map(s=>s.name).join(', ');try{const data=await callAI({model:'claude-sonnet-4-5',max_tokens:1500,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`오늘 날짜 기준 다음 종목들의 최신 뉴스 JSON 배열로 반환.\n\n종목: ${names}\n\n[{"title":"제목","summary":"한줄","stock":"종목","url":"링크"}] 최대 10개.`}]});if(data.error)throw new Error(typeof data.error==='string'?data.error:JSON.stringify(data.error));const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');try{const news=JSON.parse(text.replace(/```json|```/g,'').trim());nl.innerHTML=news.map(n=>`<div class="news-item" onclick="window.open('${n.url||'#'}','_blank')"><div style="font-size:13px;font-weight:600;margin-bottom:5px">${n.title}</div><div style="font-size:12px;color:var(--text2);margin-bottom:5px">${n.summary}</div><div style="font-size:11px;color:var(--accent);font-weight:600">${n.stock}</div></div>`).join('');}catch{nl.innerHTML=`<div class="abox on"><div class="ac">${text}</div></div>`;}}catch(e){nl.innerHTML=`<div style="color:var(--down);padding:12px">오류: ${e.message}</div>`;}finally{btn.disabled=false;btn.textContent='🔄 다시 검색';}}
function goVal(c,n,m){document.getElementById('valInput').value=n||c;window._valMarket=m||'kr';goPage('val');runVal();}
async function runVal(){const inp=document.getElementById('valInput').value.trim();if(!inp)return;const r=document.getElementById('valResult');r.innerHTML=`<div class="lw"><div class="dots"><span></span><span></span><span></span></div> 분석 중...</div>`;let ys,nm,cd,mk;const fk=KR.find(s=>s.name.includes(inp)||s.code===inp),fu=US.find(s=>s.name.includes(inp)||s.code.toLowerCase()===inp.toLowerCase());if(fk){ys=fk.yf;nm=fk.name;cd=fk.code;mk='kr';}else if(fu){ys=fu.yf;nm=fu.name;cd=fu.code;mk='us';}else{ys=inp.includes('.')?inp:(window._valMarket==='us'?inp:inp+'.KS');nm=inp;cd=inp;mk=window._valMarket||'kr';}try{const data=await callAI({model:'claude-sonnet-4-5',max_tokens:600,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`${nm}(${cd}) ${mk==='us'?'미국':'한국'} 종목 최신 밸류에이션을 검색해서 답변. PER, PBR, 목표주가, 평균 PER 등 포함.`}]});if(data.error)throw new Error(typeof data.error==='string'?data.error:JSON.stringify(data.error));const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');r.innerHTML=`<div class="abox on"><div class="ah"><div class="abadge">${nm}</div><div class="adate">${cd}</div></div><div class="ac">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`;}catch(e){r.innerHTML=`<div style="color:var(--down);padding:12px">오류: ${e.message}</div>`;}}
